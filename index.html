<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 15px;
      font-size: 20px;
    }

    input {
      padding: 8px;
      width: 65%;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    li {
      list-style: none;
      margin-top: 10px;
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }
  </style>

</head>
<body>

  <div class="container">
    <h1>📝 To-Do List</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask() {
      let input = document.getElementById("taskInput");
      let task = input.value;

      if (task === "") return;

      let li = document.createElement("li");
      li.innerHTML = task + " <button onclick='this.parentElement.remove()'>❌</button>";

      document.getElementById("taskList").appendChild(li);
      input.value = "";
    }
  </script>

</body>
</html>
